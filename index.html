<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sana Özel 💌</title>

<style>
body{
margin:0;
height:100vh;
background:#050510;
color:white;
font-family:Arial,sans-serif;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

.sayfa{
text-align:center;
width:90%;
max-width:500px;
}

h1{
font-size:40px;
}

p{
font-size:20px;
line-height:1.6;
}

button{
padding:15px 35px;
border:none;
border-radius:30px;
background:#ff4d88;
color:white;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

.ekran{
display:none;
}

.aktif{
display:block;
}

.yagmur{
position:absolute;
top:-20px;
color:#aaa;
animation:yag 4s linear infinite;
}

.kalp{
position:absolute;
bottom:-30px;
animation:kalp 5s linear infinite;
}

@keyframes yag{
to{
transform:translateY(110vh);
}
}

@keyframes kalp{
to{
transform:translateY(-110vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="sayfa">

<div id="ekran1" class="ekran aktif">
<h1>💌 Sana Özel</h1>
<p>Hazırsan küçük bir sürpriz var...</p>
<button onclick="gec(2)">Başla</button>
</div>

<div id="ekran2" class="ekran">
<h1>❤️</h1>
<p>
Bazen anlatmak zor olur ama bazı insanlar gerçekten özeldir.
</p>
<button onclick="gec(3)">Devam et</button>
</div>
